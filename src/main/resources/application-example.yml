# 墨言(Moyan) 应用配置 - 示例
# 复制此文件为 application.yml 并修改为你的实际配置

server:
  port: 8080

spring:
  application:
    name: moyan

  main:
    allow-circular-references: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  # MySQL 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/moyan?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${DB_PASSWORD:your-password}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  # Elasticsearch 配置
  elasticsearch:
    uris: http://${ES_HOST:localhost}:9200

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.liluo.moyan
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置（请修改为你自己的密钥）
jwt:
  secret: ${JWT_SECRET:your-secret-key-here}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# 布隆过滤器配置
bloom:
  filter:
    name: work-bloom-filter
    expected-insertions: 100000
    false-probability: 0.01

# 文件存储配置
file:
  storage:
    local-path: uploads
    base-url: http://localhost:8080

# 阿里云 OSS 配置（生产环境启用）
aliyun:
  oss:
    enabled: false
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY:your-access-key-id}
    access-key-secret: ${OSS_ACCESS_SECRET:your-access-key-secret}
    bucket-name: ${OSS_BUCKET:your-bucket-name}
    url-prefix: https://your-bucket.oss-cn-hangzhou.aliyuncs.com/

# AI 问答配置
ai:
  enabled: true
  api-key: ${AI_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-v4-pro

# 日志配置
logging:
  level:
    com.liluo.moyan: debug

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
