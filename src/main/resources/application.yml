# yaml-language-server: $schema=https://json.schemastore.org/spring-boot.json
# ========================================
# 墨言(Moyan) 应用配置
# 本地开发环境
# ========================================

server:
  port: 8080

spring:
  application:
    name: moyan
  
  # 允许循环依赖（临时方案）
  main:
    allow-circular-references: true


  # MySQL 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/moyan?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 1234

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 5
        max-concurrency: 10
        retry:
          enabled: true              # 启用重试
          initial-interval: 1000     # 初始间隔 1秒
          max-attempts: 3            # 最大重试次数（包含首次）
          max-interval: 10000        # 最大间隔 10秒
          multiplier: 2.0            # 间隔倍数（指数退避：1s → 2s → 4s）

  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.liluo.moyan
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: moyan-local-secret-key-for-development-testing-only
  access-token-expiration: 900000  # 15分钟（毫秒）
  refresh-token-expiration: 604800000  # 7天（毫秒）

# 布隆过滤器配置
bloom:
  filter:
    name: work-bloom-filter
    expected-insertions: 100000  # 预期容量
    false-probability: 0.01      # 误判率 1%

# 文件存储配置（默认本地存储，生产环境切换为 OSS）
file:
  storage:
    local-path: uploads              # 本地存储目录（项目根目录下）
    base-url: http://localhost:8080  # 访问基础路径

# 阿里云 OSS 配置（生产环境启用）
# 使用时将 enabled 改为 true，并填写真实密钥
aliyun:
  oss:
    enabled: false
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    url-prefix: https://your-bucket.oss-cn-hangzhou.aliyuncs.com/

# 日志配置
logging:
  level:
    com.liluo.moyan: debug

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/api/**'
      packages-to-scan: com.liluo.moyan
